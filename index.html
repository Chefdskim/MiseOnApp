<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISOYON MMS (Chef_dskim)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Pretendard', sans-serif; }
        .main-container { max-width: 600px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-pills .nav-link.active { background-color: #333; color: #fff; font-weight: bold; }
        .nav-pills .nav-link { color: #555; }
        .btn-drive { background-color: #198754; color: white; width: 100%; font-weight: bold; }
        .file-card { border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .file-card:hover { background-color: #f8f9fa; }
        .file-icon { font-size: 1.5rem; margin-right: 10px; color: #217346; }
        .loading-spinner { text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="text-center mb-4">
        <h3 style="font-weight: 800;"><i class="fas fa-utensils"></i> CHEF DSKIM MMS</h3>
        <p class="text-muted small">통합 주방 관리 시스템 (Drive 연동됨)</p>
    </div>

    <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-drive">☁️ 드라이브</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-cost">💰 원가계산</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-inv">📦 재고관리</button></li>
    </ul>

    <div class="tab-content">
        
        <div class="tab-pane fade show active" id="tab-drive">
            <div class="alert alert-success small">
                <i class="fas fa-check-circle"></i> 셰프님의 구글 드라이브와 연결되었습니다.
            </div>
            <button class="btn btn-drive mb-3" onclick="loadDriveFiles()">
                <i class="fas fa-sync-alt"></i> 드라이브 자료 불러오기
            </button>
            
            <div id="loading" class="loading-spinner">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-2 small">구글 드라이브를 뒤지는 중...</p>
            </div>

            <div id="fileList">
                <p class="text-center text-muted small mt-4">버튼을 누르면 전체 자료를 가져옵니다.</p>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-cost">
            <div class="input-group mb-2">
                <span class="input-group-text"><i class="fas fa-search"></i></span>
                <input type="text" class="form-control" id="ingSearch" placeholder="재료 검색..." onkeyup="searchIng()">
            </div>
            <div id="searchResults" class="list-group mb-3" style="display:none;"></div>
            
            <div class="card p-3 bg-light mb-3">
                <h6 class="fw-bold">메뉴: <input type="text" class="d-inline-block form-control form-control-sm w-50" placeholder="메뉴명"></h6>
                <div class="d-flex justify-content-between align-items-center">
                    <span>판매가: <input type="number" id="salePrice" class="form-control form-control-sm d-inline-block w-25" onkeyup="calcTotal()"></span>
                    <span class="badge bg-dark">마진율: <span id="marginRate">0</span>%</span>
                </div>
            </div>

            <ul class="list-group mb-3" id="costList"></ul>
            <div class="text-end fw-bold fs-5">총 원가: <span id="totalCost" class="text-danger">0</span>원</div>
        </div>

        <div class="tab-pane fade" id="tab-inv">
            <div class="input-group mb-3">
                <input type="date" class="form-control" id="invDate">
                <input type="text" class="form-control" id="invItem" placeholder="품목">
                <input type="number" class="form-control" id="invQty" placeholder="수량">
                <button class="btn btn-dark" onclick="addInv()">입고</button>
            </div>
            <table class="table table-sm table-striped">
                <thead><tr><th>날짜</th><th>품목</th><th>수량</th></tr></thead>
                <tbody id="invBody"></tbody>
            </table>
        </div>

    </div>
</div>

<script>
    // [수정 완료] 뒤에 시간을 붙여서 강제로 새 데이터를 가져옵니다.
    const DRIVE_API = "https://script.google.com/macros/s/AKfycbwy2GyIvxVQsp3hpDaf3_N4OpksYot1G1owSYwTLRC_dEVJYdlTre4fpvXJjo2dwVAy/exec" + "?t=" + new Date().getTime();

    let db = JSON.parse(localStorage.getItem('chefDB')) || [];
    let costItems = [];
    let invItems = JSON.parse(localStorage.getItem('chefInv')) || [];

    // [기능 1] 구글 드라이브 파일 불러오기
    function loadDriveFiles() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('fileList').innerHTML = '';

        fetch(DRIVE_API)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                if(data.length === 0) {
                    document.getElementById('fileList').innerHTML = '<p class="text-center">발견된 엑셀/PDF 파일이 없습니다.</p>';
                    return;
                }
                
                let html = '';
                data.forEach(file => {
                    let isExcel = file.name.includes('.xls') || file.name.includes('.xlsx');
                    let btnAction = isExcel 
                        ? `<button class="btn btn-sm btn-outline-primary" onclick="window.open('${file.url}')">다운로드</button>` 
                        : `<button class="btn btn-sm btn-outline-secondary" onclick="window.open('${file.url}')">보기</button>`;
                    
                    html += `
                    <div class="file-card">
                        <div>
                            <i class="fas ${isExcel ? 'fa-file-excel' : 'fa-file-pdf'} file-icon"></i>
                            <span class="fw-bold small">${file.name}</span>
                        </div>
                        <div>${btnAction}</div>
                    </div>`;
                });
                document.getElementById('fileList').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                alert("불러오기 실패! 잠시 후 다시 시도해주세요.");
                console.error(err);
            });
    }

    // [기능 2] 원가 계산 및 검색
    function searchIng() {
        let keyword = document.getElementById('ingSearch').value.toLowerCase();
        let box = document.getElementById('searchResults');
        box.innerHTML = '';
        if(keyword.length < 1) { box.style.display = 'none'; return; }

        let matches = db.filter(i => i.name.toLowerCase().includes(keyword)).slice(0,5);
        if(matches.length > 0) {
            box.style.display = 'block';
            matches.forEach(m => {
                box.innerHTML += `<button class="list-group-item list-group-item-action" onclick="addCostItem('${m.name}', ${m.price})">${m.name} (${m.price}원)</button>`;
            });
        } else { box.style.display = 'none'; }
    }

    function addCostItem(name, price) {
        costItems.push({name, price});
        document.getElementById('ingSearch').value = '';
        document.getElementById('searchResults').style.display = 'none';
        renderCost();
    }

    function renderCost() {
        let list = document.getElementById('costList');
        list.innerHTML = '';
        let total = 0;
        costItems.forEach((item, idx) => {
            total += item.price;
            list.innerHTML += `<li class="list-group-item d-flex justify-content-between"><span>${item.name}</span><span>${item.price}원 <i class="fas fa-times text-danger ms-2" onclick="delCost(${idx})"></i></span></li>`;
        });
        document.getElementById('totalCost').innerText = total.toLocaleString();
        calcTotal(total);
    }
    
    function delCost(idx) { costItems.splice(idx, 1); renderCost(); }

    function calcTotal(total) {
        if(!total) total = Number(document.getElementById('totalCost').innerText.replace(/,/g,''));
        let price = Number(document.getElementById('salePrice').value);
        if(price > 0) document.getElementById('marginRate').innerText = ((price - total)/price*100).toFixed(1);
    }

    // [기능 3] 재고 관리
    document.getElementById('invDate').valueAsDate = new Date();
    renderInv();
    function addInv() {
        let d = document.getElementById('invDate').value;
        let i = document.getElementById('invItem').value;
        let q = document.getElementById('invQty').value;
        if(i && q) {
            invItems.unshift({d, i, q});
            localStorage.setItem('chefInv', JSON.stringify(invItems));
            renderInv();
            document.getElementById('invItem').value = ''; document.getElementById('invQty').value = '';
        }
    }
    function renderInv() {
        let tbody = document.getElementById('invBody');
        tbody.innerHTML = '';
        invItems.forEach(r => tbody.innerHTML += `<tr><td>${r.d}</td><td>${r.i}</td><td>${r.q}</td></tr>`);
    }
</script>
</body>
</html>
