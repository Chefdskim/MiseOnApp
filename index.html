<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISOYON MMS (Chef_dskim Ver.)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
        .main-container { max-width: 600px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-pills .nav-link.active { background-color: #333; color: #fff; font-weight: bold; }
        .nav-pills .nav-link { color: #555; }
        .total-box { background: #333; color: white; padding: 15px; border-radius: 10px; text-align: right; margin-top: 15px; }
        .btn-add { background-color: #0d6efd; color: white; width: 100%; font-weight: bold; }
        .table-custom th { background-color: #f8f9fa; font-size: 0.9rem; }
        .table-custom td { vertical-align: middle; }
        .delete-btn { color: #dc3545; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="text-center mb-4">
        <h3 style="font-weight: 800;"><i class="fas fa-utensils"></i> CHEF DSKIM MMS</h3>
        <p class="text-muted small">통합 주방 관리 시스템</p>
    </div>

    <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="pills-cost-tab" data-bs-toggle="tab" data-bs-target="#pills-cost" type="button"><i class="fas fa-calculator"></i> 원가계산</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="pills-inv-tab" data-bs-toggle="tab" data-bs-target="#pills-inv" type="button"><i class="fas fa-boxes"></i> 재고장부</button>
        </li>
    </ul>

    <div class="tab-content" id="pills-tabContent">
        
        <div class="tab-pane fade show active" id="pills-cost">
            <div class="mb-3">
                <label class="form-label fw-bold">메뉴명</label>
                <input type="text" class="form-control" id="menuName" placeholder="예: 한우 갈비탕">
            </div>
            
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label fw-bold">판매가</label>
                    <input type="number" class="form-control" id="salePrice" placeholder="0" onkeyup="calcTotal()">
                </div>
                <div class="col-6 text-end d-flex align-items-end justify-content-end">
                    <span class="badge bg-primary fs-6">예상마진: <span id="marginRate">0</span>%</span>
                </div>
            </div>

            <hr>
            
            <h6 class="fw-bold"><i class="fas fa-plus-circle"></i> 재료 등록</h6>
            <div class="input-group mb-2">
                <input type="text" class="form-control" id="ingName" placeholder="품명">
                <input type="number" class="form-control" id="ingCost" placeholder="원가(원)">
            </div>
            <button class="btn btn-add py-2 mb-3" onclick="addIngredient()">재료 추가하기</button>

            <table class="table table-custom">
                <thead>
                    <tr>
                        <th style="width: 60%;">품명</th>
                        <th class="text-end">금액</th>
                        <th style="width: 10%;"></th>
                    </tr>
                </thead>
                <tbody id="costTableBody">
                    </tbody>
            </table>

            <div class="total-box">
                <div class="fs-5">총 원가: <span id="totalCost" class="fw-bold text-warning">0</span> 원</div>
            </div>
        </div>

        <div class="tab-pane fade" id="pills-inv">
            <div class="input-group mb-3">
                <input type="date" class="form-control" id="invDate">
                <button class="btn btn-outline-secondary" onclick="setToday()">오늘</button>
            </div>
            <div class="input-group mb-3">
                <input type="text" class="form-control" id="invItem" placeholder="품목명 (예: 양파)">
                <input type="number" class="form-control" id="invQty" placeholder="수량">
                <button class="btn btn-dark" onclick="addInventory()">입고</button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="fw-bold m-0">📋 입고 내역</h6>
                <button class="btn btn-sm btn-outline-danger" onclick="clearInventory()">초기화</button>
            </div>

            <table class="table table-sm table-striped table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>날짜</th>
                        <th>품목</th>
                        <th>수량</th>
                    </tr>
                </thead>
                <tbody id="invTableBody">
                    </tbody>
            </table>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // [시스템] 초기화 및 데이터 로드
    let costData = [];
    let invData = JSON.parse(localStorage.getItem('mms_inventory')) || [];
    
    setToday();
    renderInv();

    // ------------------------------------
    // 1. 원가 계산 로직
    // ------------------------------------
    function addIngredient() {
        let name = document.getElementById('ingName').value;
        let cost = Number(document.getElementById('ingCost').value);

        if (!name || cost <= 0) { alert("품명과 정확한 원가를 입력하세요."); return; }

        costData.push({ name: name, cost: cost });
        renderCost();
        
        // 입력창 비우기
        document.getElementById('ingName').value = '';
        document.getElementById('ingCost').value = '';
        document.getElementById('ingName').focus();
    }

    function removeCost(index) {
        costData.splice(index, 1);
        renderCost();
    }

    function renderCost() {
        let tbody = document.getElementById('costTableBody');
        tbody.innerHTML = '';
        let total = 0;

        costData.forEach((item, index) => {
            total += item.cost;
            let row = `<tr>
                <td>${item.name}</td>
                <td class="text-end">${item.cost.toLocaleString()}</td>
                <td class="text-center"><i class="fas fa-trash-alt delete-btn" onclick="removeCost(${index})"></i></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('totalCost').innerText = total.toLocaleString();
        calcTotal(total);
    }

    function calcTotal(currentTotal) {
        if (!currentTotal) currentTotal = Number(document.getElementById('totalCost').innerText.replace(/,/g, ''));
        let salePrice = Number(document.getElementById('salePrice').value);
        
        if (salePrice > 0) {
            let margin = ((salePrice - currentTotal) / salePrice) * 100;
            document.getElementById('marginRate').innerText = margin.toFixed(1);
        } else {
            document.getElementById('marginRate').innerText = '0';
        }
    }

    // ------------------------------------
    // 2. 재고 장부 로직
    // ------------------------------------
    function setToday() {
        document.getElementById('invDate').valueAsDate = new Date();
    }

    function addInventory() {
        let date = document.getElementById('invDate').value;
        let item = document.getElementById('invItem').value;
        let qty = document.getElementById('invQty').value;

        if (!item || !qty) return;

        invData.unshift({ date: date, item: item, qty: qty }); // 최신순 저장
        localStorage.setItem('mms_inventory', JSON.stringify(invData));
        renderInv();
        
        document.getElementById('invItem').value = '';
        document
